name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: envlt-linux-x86_64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact_name: envlt-linux-aarch64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            artifact_name: envlt-macos-x86_64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: x86_64-apple-darwin
          - os: macos-15
            artifact_name: envlt-macos-aarch64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.rust_target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.rust_target }} -p envlt-cli

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}
          shasum -a 256 ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} > ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256
