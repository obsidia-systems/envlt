name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: envlt-linux-x86_64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact_name: envlt-linux-aarch64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            artifact_name: envlt-macos-x86_64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: x86_64-apple-darwin
          - os: macos-15
            artifact_name: envlt-macos-aarch64
            binary_name: envlt
            archive_ext: tar.gz
            rust_target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.rust_target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.rust_target }} -p envlt-cli

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}
          shasum -a 256 ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} > ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

  update-homebrew-tap:
    name: Open PR in homebrew-tap
    runs-on: ubuntu-24.04
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball SHA256
        id: source
        run: |
          URL="https://github.com/obsidia-systems/envlt/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          curl -Ls "$URL" -o source.tar.gz
          SHA="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: obsidia-systems/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula/envlt.rb
        run: |
          FILE="homebrew-tap/Formula/envlt.rb"

          perl -0pi -e 's/version\s+"[0-9]+\.[0-9]+\.[0-9]+"/version "'"${{ steps.version.outputs.version }}"'"/g' "$FILE"
          perl -0pi -e 's|url\s+"https://github\.com/obsidia-systems/envlt/archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz"|url "'"${{ steps.source.outputs.url }}"'"|g' "$FILE"
          perl -0pi -e 's/sha256\s+"[a-f0-9]{64}"/sha256 "'"${{ steps.source.outputs.sha }}"'"/g' "$FILE"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          branch: chore/envlt-${{ steps.version.outputs.version }}
          delete-branch: true
          commit-message: "envlt ${{ steps.version.outputs.version }}"
          title: "envlt ${{ steps.version.outputs.version }}"
          body: |
            Automated formula update from envlt release.

            - Version: ${{ steps.version.outputs.version }}
            - Source URL: ${{ steps.source.outputs.url }}
            - SHA256: ${{ steps.source.outputs.sha }}
          labels: |
            dependencies
            homebrew
