name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: envlt-linux-x86_64
            binary_name: envlt
            archive_ext: tar.gz
          - os: macos-latest
            artifact_name: envlt-macos-host
            binary_name: envlt
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75.0

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p envlt-cli

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
